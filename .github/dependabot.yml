version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - 'next'
          - 'eslint-config-next'
          - '@next/*'
      react:
        patterns:
          - 'react'
          - 'react-dom'
          - '@types/react'
          - '@types/react-dom'
      vitest:
        patterns:
          - 'vitest'
          - '@vitest/*'
      playwright:
        patterns:
          - '@playwright/*'
          - 'playwright'
      libsql:
        patterns:
          - '@libsql/*'
      anthropic:
        patterns:
          - '@anthropic-ai/*'
      types:
        patterns:
          - '@types/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - '*'
